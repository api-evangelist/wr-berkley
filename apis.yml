aid: wr-berkley
name: W. R. Berkley
description: >-
  W. R. Berkley Corporation is one of the largest commercial lines property and
  casualty insurance holding companies in the United States, operating through
  more than 60 operating units in approximately 60 countries. The company
  operates across two business segments: Insurance and Reinsurance and
  Monoline. Subsidiaries include BerkleyNet (workers' compensation), Berkley
  Risk Administrators, and others. W. R. Berkley does not offer a public
  developer API, though subsidiary portals and agent portals provide limited
  policy, billing, and claims access.
